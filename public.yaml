name: peliculas_clasicas
description: Una aplicación de catálogo de películas clásicas con Flutter, TMDB API y Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase (versiones actualizadas 2024/2025)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  
  # Para peticiones HTTP a TMDB
  http: ^1.1.0
  
  # Iconos adicionales
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  # Assets: imágenes locales
  assets:
    - assets/Peliculas_clasicas.webp
    # Si quieres agregar más imágenes en el futuro:
    # - assets/images/
  
  # Fuentes personalizadas (opcional)
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
